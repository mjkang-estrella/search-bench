<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="820" viewBox="0 0 1120 820" role="img" aria-labelledby="title desc">
  <title id="title">Fast AI-generated search response benchmark</title>
  <desc id="desc">Benchmark plot showing Liner Quick Answer API as the lowest-cost generated answer endpoint with competitive latency among web-grounded generated-answer APIs.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#101828" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#98A2B3"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #101828; }
    .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475467; }
    .section-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #101828; }
    .axis-label { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #344054; }
    .axis-tick { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667085; }
    .point-label { font: 750 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .point-value { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667085; }
    .table-head { font: 750 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475467; }
    .table-name { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #344054; }
    .table-value { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667085; }
    .callout-title { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #063F2A; }
    .callout-body { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #164B35; }
    .note { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667085; }
    .legend { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #344054; }
  </style>
  <rect width="1120" height="820" fill="#F7F8FA"/>
  <rect x="36" y="34" width="1048" height="752" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="80" y="86" class="title">Liner: the low-cost quick-answer point</text>
  <text x="80" y="118" class="subtitle">Same prompt, same local environment: "What is retrieval augmented generation?" Lower-left is better.</text>

  <g transform="translate(80 150)">
    <rect width="300" height="66" rx="8" fill="#E9F8F1" stroke="#B7E7D0"/>
    <text x="20" y="30" class="callout-title">Lowest generated-answer cost</text>
    <text x="20" y="53" class="callout-body">Liner is 62% below Tavily</text>
  </g>
  <g transform="translate(410 150)">
    <rect width="300" height="66" rx="8" fill="#E9F8F1" stroke="#B7E7D0"/>
    <text x="20" y="30" class="callout-title">Quick generated answer</text>
    <text x="20" y="53" class="callout-body">1.7x faster than Perplexity</text>
  </g>
  <g transform="translate(740 150)">
    <rect width="300" height="66" rx="8" fill="#E9F8F1" stroke="#B7E7D0"/>
    <text x="20" y="30" class="callout-title">Light answer surface</text>
    <text x="20" y="53" class="callout-body">4.0x faster than Exa Answer</text>
  </g>

  <text x="116" y="248" class="section-title">Cost vs. latency for generated answers</text>
  <text x="836" y="248" class="note" text-anchor="end">Parallel is capped at 6s on the plot.</text>
  <rect x="116" y="282" width="720" height="380" fill="#FFFFFF" stroke="#D0D5DD"/>
  
      <line x1="116.0" y1="282" x2="116.0" y2="662" stroke="#EAECF0"/>
      <text x="116.0" y="690" class="axis-tick" text-anchor="middle">$0</text>
            
      <line x1="285.4" y1="282" x2="285.4" y2="662" stroke="#EAECF0"/>
      <text x="285.4" y="690" class="axis-tick" text-anchor="middle">$2</text>
            
      <line x1="454.8" y1="282" x2="454.8" y2="662" stroke="#EAECF0"/>
      <text x="454.8" y="690" class="axis-tick" text-anchor="middle">$4</text>
            
      <line x1="624.2" y1="282" x2="624.2" y2="662" stroke="#EAECF0"/>
      <text x="624.2" y="690" class="axis-tick" text-anchor="middle">$6</text>
            
      <line x1="793.6" y1="282" x2="793.6" y2="662" stroke="#EAECF0"/>
      <text x="793.6" y="690" class="axis-tick" text-anchor="middle">$8</text>
            
      <line x1="116" y1="662.0" x2="836" y2="662.0" stroke="#EAECF0"/>
      <text x="98" y="667.0" class="axis-tick" text-anchor="end">0s</text>
            
      <line x1="116" y1="598.7" x2="836" y2="598.7" stroke="#EAECF0"/>
      <text x="98" y="603.7" class="axis-tick" text-anchor="end">1s</text>
            
      <line x1="116" y1="535.3" x2="836" y2="535.3" stroke="#EAECF0"/>
      <text x="98" y="540.3" class="axis-tick" text-anchor="end">2s</text>
            
      <line x1="116" y1="472.0" x2="836" y2="472.0" stroke="#EAECF0"/>
      <text x="98" y="477.0" class="axis-tick" text-anchor="end">3s</text>
            
      <line x1="116" y1="408.7" x2="836" y2="408.7" stroke="#EAECF0"/>
      <text x="98" y="413.7" class="axis-tick" text-anchor="end">4s</text>
            
      <line x1="116" y1="345.3" x2="836" y2="345.3" stroke="#EAECF0"/>
      <text x="98" y="350.3" class="axis-tick" text-anchor="end">5s</text>
            
      <line x1="116" y1="282.0" x2="836" y2="282.0" stroke="#EAECF0"/>
      <text x="98" y="287.0" class="axis-tick" text-anchor="end">6s</text>
            
  <line x1="116" y1="662" x2="836" y2="662" stroke="#667085" stroke-width="1.4"/>
  <line x1="116" y1="282" x2="116" y2="662" stroke="#667085" stroke-width="1.4"/>
  <text x="476.0" y="724" class="axis-label" text-anchor="middle">Estimated cost per 1K successful calls</text>
  <text x="42" y="472.0" class="axis-label" text-anchor="middle" transform="rotate(-90 42 472.0)">p50 full latency</text>
  
      <g opacity="0.95">
        
        
        <circle cx="793.6" cy="653.3" r="8" fill="#F59E0B" stroke="#FFFFFF" stroke-width="3"/>
      </g>
            
      <g opacity="0.95">
        <circle cx="370.1" cy="573.2" r="25" fill="#00A66A" opacity="0.14"/>
        <circle cx="370.1" cy="573.2" r="17" fill="none" stroke="#00A66A" stroke-width="3"/>
        <circle cx="370.1" cy="573.2" r="12" fill="#00A66A" stroke="#FFFFFF" stroke-width="3"/>
      </g>
            
      <g opacity="0.95">
        
        
        <circle cx="555.2" cy="508.4" r="8" fill="#6D5DF6" stroke="#FFFFFF" stroke-width="3"/>
      </g>
            
      <g opacity="0.95">
        
        
        <circle cx="539.5" cy="310.5" r="8" fill="#4776E6" stroke="#FFFFFF" stroke-width="3"/>
      </g>
            
      <g opacity="0.55">
        
        
        <circle cx="539.5" cy="282.0" r="8" fill="#98A2B3" stroke="#FFFFFF" stroke-width="3"/>
      </g>
            
  <line x1="392.1" y1="559.2" x2="464.1" y2="503.2" stroke="#00A66A" stroke-width="2"/>
  <g transform="translate(472.1 475.2)">
    <rect width="178" height="58" rx="8" fill="#E9F8F1" stroke="#8FDCB7"/>
    <text x="14" y="24" class="point-label" fill="#063F2A">Liner</text>
    <text x="14" y="44" class="point-value">$3 / 1K, 1.4s p50</text>
  </g>

  <g transform="translate(866 282)">
    <rect width="180" height="318" rx="8" fill="#F9FAFB" stroke="#EAECF0"/>
    <text x="14" y="26" class="table-head">Provider</text>
    <text x="120" y="26" class="table-head">$/1K</text>
    <text x="14" y="52" class="note">Cost and p50 latency</text>
    
      <g transform="translate(14 92)" opacity="1">
        <circle cx="0" cy="0" r="6" fill="#00A66A"/>
        <text x="18" y="5" class="table-name">Liner</text>
        <text x="106" y="5" class="table-value">$3</text>
        <text x="18" y="24" class="table-value">1.4s p50</text>
      </g>
            
      <g transform="translate(14 134)" opacity="1">
        <circle cx="0" cy="0" r="6" fill="#4776E6"/>
        <text x="18" y="5" class="table-name">Exa</text>
        <text x="106" y="5" class="table-value">$5</text>
        <text x="18" y="24" class="table-value">5.5s p50</text>
      </g>
            
      <g transform="translate(14 176)" opacity="0.55">
        <circle cx="0" cy="0" r="6" fill="#98A2B3"/>
        <text x="18" y="5" class="table-name">Parallel</text>
        <text x="106" y="5" class="table-value">$5</text>
        <text x="18" y="24" class="table-value">44.1s p50</text>
      </g>
            
      <g transform="translate(14 218)" opacity="1">
        <circle cx="0" cy="0" r="6" fill="#6D5DF6"/>
        <text x="18" y="5" class="table-name">Perplexity</text>
        <text x="106" y="5" class="table-value">$5.185</text>
        <text x="18" y="24" class="table-value">2.4s p50</text>
      </g>
            
      <g transform="translate(14 260)" opacity="1">
        <circle cx="0" cy="0" r="6" fill="#F59E0B"/>
        <text x="18" y="5" class="table-name">Tavily</text>
        <text x="106" y="5" class="table-value">$8</text>
        <text x="18" y="24" class="table-value">138ms p50</text>
      </g>
            
  </g>

  <g transform="translate(866 622)">
    <rect width="180" height="78" rx="8" fill="#F9FAFB" stroke="#EAECF0"/>
    <text x="16" y="28" class="note">Fallback baseline</text>
    <circle cx="22" cy="58" r="7" fill="#98A2B3"/>
    <text x="38" y="63" class="legend">Brave</text>
    <text x="92" y="63" class="note">125ms retrieval</text>
  </g>

  <g transform="translate(80 738)">
    <rect width="960" height="34" rx="8" fill="#F2F4F7"/>
    <text x="18" y="22" class="note" textLength="880" lengthAdjust="spacingAndGlyphs">Source: Fast AI-Generated Search Response Benchmark (2026-05-21). Brave excluded: Web Search fallback, not AI Grounding.</text>
  </g>
</svg>
